<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HG Detailer 013 - Agendamento</title>
    <style>
        :root {
            --gold: #f1c40f;
            --dark-card: #1a1a1a;
            --text: #ffffff;
        }
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: #000; 
            color: var(--text); 
            text-align: center; 
            padding: 20px;
            margin: 0;
        }
        .header { margin-bottom: 30px; }
        .header h1 { color: var(--gold); font-size: 2.2em; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        .header p { color: #888; font-style: italic; }

        .card { 
            background: var(--dark-card); 
            padding: 30px; 
            margin: 0 auto 20px; 
            border-radius: 25px; 
            max-width: 450px; 
            border: 1px solid #333; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        label { display: block; text-align: left; margin: 10px 0 5px 5%; font-size: 14px; color: var(--gold); }
        
        input, select { 
            width: 90%; padding: 14px; margin-bottom: 15px; border-radius: 12px; 
            border: 1px solid #444; background: #0a0a0a; color: #fff; font-size: 16px; 
        }

        button { 
            padding: 16px; width: 95%; border-radius: 12px; border: none; 
            cursor: pointer; font-weight: bold; font-size: 17px; transition: 0.3s; 
            text-transform: uppercase;
        }
        .btn-agendar { background: linear-gradient(45deg, #f1c40f, #d4af37); color: #000; margin-top: 10px; }
        .btn-agendar:active { transform: scale(0.96); }

        .btn-insta { background: transparent; color: #e1306c; border: 1px solid #e1306c; margin-top: 20px; font-size: 14px; width: auto; padding: 10px 20px; }

        .btn-zap-admin { background: #25d366; color: white; padding: 5px 10px; font-size: 12px; width: auto; margin-top: 5px; }

        #admin { margin-top: 40px; border-color: var(--gold); }
        .item-agendado { border-bottom: 1px solid #333; padding: 15px 0; text-align: left; }
        .item-agendado b { color: var(--gold); }
    </style>
</head>
<body>

    <div class="header">
        <h1>HG Detailer 013</h1>
        <p>✨ Seu carro brilhando como novo!</p>
    </div>

    <div class="card">
        <label>Seu Nome</label>
        <input id="nome" placeholder="Ex: Renato Silva">

        <label>WhatsApp</label>
        <input id="whats" type="tel" placeholder="(13) 99999-9999">

        <label>Tipo de Veículo</label>
        <select id="veiculo">
            <option value="Carro">Carro 🚗</option>
            <option value="Moto">Moto 🏍️</option>
        </select>

        <label>Modelo do Veículo</label>
        <input id="modelo" placeholder="Ex: Civic G10 / Hornet">

        <label>Data Preferencial</label>
        <input id="data" type="date">

        <button class="btn-agendar" onclick="agendar()">Agendar agora</button>
    </div>

    <button class="btn-insta" onclick="window.open('https://www.instagram.com/hg.detailer013', '_blank')">
        📸 Siga @hg.detailer013
    </button>

    <div style="margin-top: 50px;">
        <button onclick="document.getElementById('admin-box').style.display='block'" style="background:none; color:#444; font-size:12px;">Acesso Restrito</button>
    </div>

    <div id="admin-box" style="display:none" class="card">
        <h3 style="color:var(--gold)">Painel Admin</h3>
        <input id="senha" type="password" placeholder="Senha">
        <button onclick="loginAdmin()" style="background:#333; color:#fff;">Ver Pedidos</button>
        <div id="lista"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD69US1QzZhPSF680UvXNdduPIEzEYpgjQ",
            authDomain: "hg-detailer.firebaseapp.com",
            projectId: "hg-detailer",
            storageBucket: "hg-detailer.firebasestorage.app",
            messagingSenderId: "411232406537",
            appId: "1:411232406537:web:7f47e0ca3b161cc3fbfcd8",
            measurementId: "G-7X5Y2SDKWZ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.agendar = async function() {
            const nome = document.getElementById("nome").value;
            const whats = document.getElementById("whats").value;
            const veiculo = document.getElementById("veiculo").value;
            const modelo = document.getElementById("modelo").value;
            const data = document.getElementById("data").value;

            if(!nome || !whats || !data) { alert("Preencha os campos principais!"); return; }

            try {
                await addDoc(collection(db, "agendamentos"), {
                    nome, whats, veiculo, modelo, data, criadoEm: new Date()
                });
                alert("🚀 Agendamento enviado! Aguarde nosso contato.");
                location.reload();
            } catch (e) { alert("Erro ao salvar."); }
        };

        window.loginAdmin = async function() {
            if(document.getElementById("senha").value !== "123456") { alert("Senha errada"); return; }
            
            const q = query(collection(db, "agendamentos"), orderBy("criadoEm", "desc"));
            const snap = await getDocs(q);
            let html = "";
            
            snap.forEach(doc => {
                const d = doc.data();
                const linkZap = `https://wa.me/55${d.whats.replace(/\D/g,'')}?text=Olá ${d.nome}, vi seu agendamento da ${d.veiculo} no site da HG Detailer!`;
                
                html += `<div class="item-agendado">
                    <b>Cliente:</b> ${d.nome}<br>
                    <b>Veículo:</b> ${d.veiculo} - ${d.modelo}<br>
                    <b>Data:</b> ${d.data}<br>
                    <button class="btn-zap-admin" onclick="window.open('${linkZap}')">Chamar no WhatsApp</button>
                </div>`;
            });
            document.getElementById("lista").innerHTML = html || "Nenhum pedido.";
        };
    </script>
</body>
</html>
