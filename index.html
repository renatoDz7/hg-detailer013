<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HG Detailer 013 - Agendamento</title>
    <style>
        :root { --gold: #f1c40f; --dark: #0a0a0a; --card: #151515; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--text); margin: 0; padding: 15px; text-align: center; }
        .container { max-width: 450px; margin: 0 auto; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #222; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h1 { color: var(--gold); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        label { display: block; text-align: left; margin: 15px 0 5px 5px; color: var(--gold); font-size: 12px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; font-size: 16px; }
        
        .info-vagas { font-size: 14px; font-weight: bold; padding: 12px; border-radius: 8px; margin: 10px 0; display: none; }
        .vaga-livre { background: rgba(39, 174, 96, 0.1); color: #2ecc71; border: 1px solid #27ae60; }
        .vaga-ocupada { background: rgba(192, 57, 43, 0.1); color: #e74c3c; border: 1px solid #c0392b; }
        .preco-aviso { background: #f1c40f22; color: var(--gold); border: 1px solid var(--gold); padding: 10px; border-radius: 8px; font-size: 14px; margin-bottom: 15px; display: none; text-align: left; }

        button { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .btn-confirmar { background: linear-gradient(45deg, #f1c40f, #d4af37); color: #000; font-size: 16px; margin-top: 10px; }
        .btn-confirmar:disabled { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; }
        
        .item-admin { background: #000; padding: 15px; border-radius: 10px; border-left: 4px solid var(--gold); margin-bottom: 15px; text-align: left; font-size: 14px; color: white; }
        .btn-excluir { background: #e74c3c; color: #fff; padding: 8px; border-radius: 6px; width: 100%; font-size: 12px; margin-top: 10px; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <h1>HG Detailer 013</h1>
        <p style="color:#666; font-size:12px; letter-spacing: 1px;">ESTÉTICA AUTOMOTIVA</p>

        <div class="card">
            <label>NOME COMPLETO</label>
            <input id="nome" placeholder="Seu nome" oninput="window.validarBotao()">

            <label>SEU WHATSAPP</label>
            <input id="whats" type="tel" placeholder="13997000000" oninput="window.validarBotao()">

            <label>CATEGORIA DO VEÍCULO</label>
            <select id="tipo" onchange="window.atualizarPreco()">
                <option value="">Selecione o Porte</option>
                <option value="Moto">Moto</option>
                <option value="Pequeno">Carro Pequeno (Hatch)</option>
                <option value="Medio">Carro Médio (Sedan / SUV)</option>
                <option value="Grande">Carro Grande (Caminhonete / 7 Lug)</option>
            </select>

            <div id="preco-aviso" class="preco-aviso"></div>

            <label>DATA DO SERVIÇO</label>
            <input id="data" type="date" onchange="window.verificarDisponibilidadeTotal()">
            
            <div id="info-vagas" class="info-vagas"></div>

            <div id="box-horario" style="display:none;">
                <label>HORÁRIO DISPONÍVEL</label>
                <select id="hora" onchange="window.validarBotao()">
                    <option value="">Selecione o Horário</option>
                    <option id="opt-08" value="08:00">08:00 (Manhã)</option>
                    <option id="opt-13" value="13:00">13:00 (Tarde)</option>
                </select>

                <label>LOGÍSTICA</label>
                <select id="logistica" onchange="window.toggleEndereco()">
                    <option value="levar">Eu vou levar o veículo</option>
                    <option value="buscar">Quero que busquem (Leva e Traz)</option>
                </select>

                <div id="box-endereco" style="display:none;">
                    <label>SEU ENDEREÇO (RUA, NÚMERO, BAIRRO)</label>
                    <textarea id="endereco" placeholder="Digite onde buscar o veículo..." oninput="window.validarBotao()"></textarea>
                </div>
            </div>

            <button class="btn-confirmar" id="btnSalvar" onclick="window.agendar()" disabled>Reservar Agora</button>
        </div>

        <button onclick="document.getElementById('admin-box').style.display='block'" style="background:none; color:#222; font-size: 10px; border:none; margin-top: 20px; cursor: pointer;">PAINEL ADMIN</button>

        <div id="admin-box" style="display:none" class="card">
            <h3 style="color:var(--gold)">GERENCIAR AGENDA</h3>
            <input id="senha" type="password" placeholder="Senha do Admin">
            <button onclick="window.carregarAgenda()" style="background:#333; color:#fff; margin-bottom:10px;">VER AGENDAMENTOS</button>
            <button onclick="document.getElementById('admin-box').style.display='none'" style="background:none; color:red; font-size:10px; border:none;">FECHAR</button>
            <div id="lista" style="margin-top:20px"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD69US1QzZhPSF680UvXNdduPIEzEYpgjQ",
            authDomain: "hg-detailer.firebaseapp.com",
            projectId: "hg-detailer",
            storageBucket: "hg-detailer.firebasestorage.app",
            messagingSenderId: "411232406537",
            appId: "1:411232406537:web:7f47e0ca3b161cc3fbfcd8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- FUNÇÕES DA INTERFACE ---

        window.toggleEndereco = function() {
            const log = document.getElementById("logistica").value;
            document.getElementById("box-endereco").style.display = (log === "buscar") ? "block" : "none";
            window.validarBotao();
        };

        window.atualizarPreco = function() {
            const tipo = document.getElementById("tipo").value;
            const aviso = document.getElementById("preco-aviso");
            let preco = "";
            if(tipo === "Moto") preco = "Valor: R$ 50,00";
            if(tipo === "Pequeno") preco = "Valor: R$ 80,00";
            if(tipo === "Medio") preco = "Valor: R$ 100,00";
            if(tipo === "Grande") preco = "Valor: R$ 130,00";

            if(preco) {
                aviso.style.display = "block";
                aviso.innerHTML = `💰 <b>${preco}</b><br><small>Lavagem completa + proteção.</small>`;
            } else { aviso.style.display = "none"; }
            window.verificarDisponibilidadeTotal();
        };

        window.verificarDisponibilidadeTotal = async function() {
            const dataVal = document.getElementById("data").value;
            const tipo = document.getElementById("tipo").value;
            const info = document.getElementById("info-vagas");
            const boxHorario = document.getElementById("box-horario");

            if(!dataVal || !tipo) return;

            info.style.display = "block";
            info.innerHTML = "Consultando agenda...";
            info.className = "info-vagas";

            try {
                const snap = await getDocs(collection(db, "agendamentos"));
                let ocupados = [];
                let carrosNoDia = 0;
                let motosNoDia = 0;

                snap.forEach(res => {
                    const d = res.data();
                    if(d.data === dataVal) {
                        ocupados.push(d.hora);
                        if(d.tipo === "Moto") motosNoDia++; else carrosNoDia++;
                    }
                });

                let limiteAtingido = false;
                if(tipo !== "Moto" && carrosNoDia >= 2) limiteAtingido = "Limite de CARROS atingido!";
                if(tipo === "Moto" && motosNoDia >= 1) limiteAtingido = "Limite de MOTOS atingido!";

                if(ocupados.length >= 2 || limiteAtingido) {
                    info.innerHTML = ocupados.length >= 2 ? "❌ AGENDA LOTADA!" : `⚠️ ${limiteAtingido}`;
                    info.className = "info-vagas vaga-ocupada";
                    boxHorario.style.display = "none";
                } else {
                    info.innerHTML = "✅ Temos horários disponíveis!";
                    info.className = "info-vagas vaga-vaga-livre";
                    boxHorario.style.display = "block";
                    document.getElementById("opt-08").disabled = ocupados.includes("08:00");
                    document.getElementById("opt-13").disabled = ocupados.includes("13:00");
                    window.validarBotao();
                }
            } catch(e) { console.error(e); }
        };

        window.validarBotao = function() {
            const nome = document.getElementById("nome").value;
            const whats = document.getElementById("whats").value;
            const hora = document.getElementById("hora").value;
            const data = document.getElementById("data").value;
            const log = document.getElementById("logistica").value;
            const end = document.getElementById("endereco").value;
            
            let liberado = (nome && whats && hora && data);
            if(log === "buscar" && !end) liberado = false;
            
            document.getElementById("btnSalvar").disabled = !liberado;
        };

        window.agendar = async function() {
            const btn = document.getElementById("btnSalvar");
            const logValue = document.getElementById("logistica").value;
            const d = {
                nome: document.getElementById("nome").value,
                whats: document.getElementById("whats").value,
                tipo: document.getElementById("tipo").value,
                data: document.getElementById("data").value,
                hora: document.getElementById("hora").value,
                logistica: logValue === "buscar" ? "BUSCAR NO ENDEREÇO" : "CLIENTE LEVA",
                endereco: document.getElementById("endereco").value || "N/A",
                ts: new Date().getTime()
            };

            btn.disabled = true;
            try {
                await addDoc(collection(db, "agendamentos"), d);
                const meuZap = "5513997441962";
                
                // Texto do WhatsApp Dinâmico
                let logMsg = `%0A🚚 *Logística:* ${d.logistica}`;
                if(logValue === "buscar") {
                    logMsg += `%0A📍 *Endereço:* ${d.endereco}`;
                } else {
                    logMsg += `%0A📍 *Localização do Lava Jato:* https://maps.google.com/?q=SEU_ENDERECO_AQUI`; 
                }

                const msg = `*NOVO AGENDAMENTO*%0A👤 Cliente: ${d.nome}%0A📅 Data: ${d.data}%0A⏰ Hora: ${d.hora}%0A🚗 Porte: ${d.tipo}${logMsg}`;
                
                alert("🚀 Agendado com sucesso!");
                window.location.href = `https://wa.me/${meuZap}?text=${msg}`;
            } catch(e) { alert("Erro ao salvar!"); btn.disabled = false; }
        };

        window.carregarAgenda = async function() {
            if(document.getElementById("senha").value !== "123456") return alert("Senha incorreta!");
            const listaDiv = document.getElementById("lista");
            listaDiv.innerHTML = "Carregando...";
            try {
                const snap = await getDocs(collection(db, "agendamentos"));
                let ags = [];
                snap.forEach(res => { if(res.data().data) ags.push({id: res.id, ...res.data()}); });
                ags.sort((a,b) => (a.data || "").localeCompare(b.data || ""));
                let html = "";
                ags.forEach(item => {
                    html += `<div class="item-admin"><b>📅 ${item.data} - ${item.hora}</b><br>
                    👤 ${item.nome} (${item.tipo})<br>
                    🚚 ${item.logistica}<br>
                    ${item.logistica.includes("BUSCAR") ? "📍 " + item.endereco + "<br>" : ""}
                    📱 ${item.whats}<br>
                    <button class="btn-excluir" onclick="window.removerAgendamento('${item.id}')">EXCLUIR</button></div>`;
                });
                listaDiv.innerHTML = html || "Nenhum agendamento.";
            } catch (e) { alert("Erro ao carregar!"); }
        };

        window.removerAgendamento = async function(id) {
            if(confirm("Apagar?")) {
                await deleteDoc(doc(db, "agendamentos", id));
                window.carregarAgenda();
            }
        };
    </script>
</body>
</html>
