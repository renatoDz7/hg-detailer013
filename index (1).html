<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HG Detailer 013 - Agendamento</title>
    <style>
        :root { --gold: #f1c40f; --dark-card: #1a1a1a; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: var(--text); text-align: center; padding: 20px; margin: 0; }
        .header h1 { color: var(--gold); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        .card { background: var(--dark-card); padding: 25px; margin: 0 auto 20px; border-radius: 20px; max-width: 450px; border: 1px solid #333; }
        label { display: block; text-align: left; margin: 10px 0 5px 5%; font-size: 14px; color: var(--gold); }
        input, select { width: 90%; padding: 12px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #444; background: #0a0a0a; color: #fff; font-size: 16px; }
        button { padding: 15px; width: 95%; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .btn-agendar { background: linear-gradient(45deg, #f1c40f, #d4af37); color: #000; }
        .btn-admin-trigger { background: transparent; color: #333; font-size: 10px; margin-top: 50px; width: auto; border: 1px solid #222; }
        .btn-zap { background: #25d366; color: white; padding: 8px; font-size: 11px; width: auto; margin-right: 5px; display: inline-block; }
        .btn-excluir { background: #c0392b; color: white; padding: 8px; font-size: 11px; width: auto; display: inline-block; }
        .item-agendado { border-bottom: 1px solid #333; padding: 15px 0; text-align: left; }
        .item-agendado b { color: var(--gold); }
    </style>
</head>
<body>

    <div class="header">
        <h1>HG Detailer 013</h1>
        <p>✨ Agenda Inteligente - Registro/SP</p>
    </div>

    <div class="card">
        <label>Seu Nome</label>
        <input id="nome" placeholder="Nome Completo">
        <label>WhatsApp (DDD)</label>
        <input id="whats" type="tel" placeholder="13999999999">
        <label>Tipo de Veículo</label>
        <select id="tipo">
            <option value="Carro">Carro (Máx 2 por dia)</option>
            <option value="Moto">Moto (Máx 1 por dia)</option>
        </select>
        <label>Modelo</label>
        <input id="modelo" placeholder="Ex: Civic / Hornet">
        <label>Data</label>
        <input id="data" type="date">
        <label>Horário</label>
        <select id="hora">
            <option value="08:00">08:00 (Manhã)</option>
            <option value="13:00">13:00 (Tarde)</option>
        </select>
        <button class="btn-agendar" id="btnSalvar" onclick="agendar()">Confirmar Agendamento</button>
    </div>

    <button class="btn-admin-trigger" onclick="document.getElementById('admin-box').style.display='block'">Painel Admin</button>

    <div id="admin-box" style="display:none" class="card">
        <h3 style="color:var(--gold)">Agenda da HG</h3>
        <input id="senha" type="password" placeholder="Senha do Painel">
        <button onclick="loginAdmin()" style="background:#444; color:#fff;">Atualizar Lista</button>
        <div id="lista" style="margin-top:20px"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD69US1QzZhPSF680UvXNdduPIEzEYpgjQ",
            authDomain: "hg-detailer.firebaseapp.com",
            projectId: "hg-detailer",
            storageBucket: "hg-detailer.firebasestorage.app",
            messagingSenderId: "411232406537",
            appId: "1:411232406537:web:7f47e0ca3b161cc3fbfcd8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.agendar = async function() {
            const btn = document.getElementById("btnSalvar");
            const dados = {
                nome: document.getElementById("nome").value,
                whats: document.getElementById("whats").value,
                tipo: document.getElementById("tipo").value,
                modelo: document.getElementById("modelo").value,
                data: document.getElementById("data").value,
                hora: document.getElementById("hora").value,
                criadoEm: new Date().getTime()
            };

            if(!dados.nome || !dados.data) { alert("Preencha o nome e a data!"); return; }
            btn.disabled = true;

            const snap = await getDocs(collection(db, "agendamentos"));
            let carrosNoDia = 0;
            let motosNoDia = 0;
            let horaOcupada = false;

            snap.forEach(res => {
                const d = res.data();
                if(d.data === dados.data) {
                    if(d.hora === dados.hora) horaOcupada = true;
                    if(d.tipo === "Carro") carrosNoDia++;
                    if(d.tipo === "Moto") motosNoDia++;
                }
            });

            if(horaOcupada) { alert("⚠️ Esse horário já está ocupado!"); btn.disabled = false; return; }
            if(dados.tipo === "Carro" && carrosNoDia >= 2) { alert("❌ Limite de 2 carros no dia atingido!"); btn.disabled = false; return; }
            if(dados.tipo === "Moto" && motosNoDia >= 1) { alert("❌ Limite de 1 moto no dia atingido!"); btn.disabled = false; return; }

            await addDoc(collection(db, "agendamentos"), dados);
            alert("🚀 Agendado com sucesso!");
            location.reload();
        };

        window.loginAdmin = async function() {
            if(document.getElementById("senha").value !== "123456") { alert("Senha incorreta"); return; }
            const snap = await getDocs(collection(db, "agendamentos"));
            let html = "";
            let agendamentos = [];
            
            snap.forEach(res => { agendamentos.push({id: res.id, ...res.data()}); });
            
            // Ordenar por data manualmente para não precisar de índice no Firebase
            agendamentos.sort((a,b) => a.data.localeCompare(b.data));

            agendamentos.forEach(d => {
                html += `<div class="item-agendado" id="item-${d.id}">
                    <b>Data:</b> ${d.data} às ${d.hora}<br>
                    <b>Veículo:</b> ${d.tipo} (${d.modelo})<br>
                    <b>Cliente:</b> ${d.nome}<br>
                    <button class="btn-zap" onclick="window.open('https://wa.me/55${d.whats.replace(/\D/g,'')}')">ZAP</button>
                    <button class="btn-excluir" onclick="excluirItem('${d.id}')">EXCLUIR</button>
                </div>`;
            });
            document.getElementById("lista").innerHTML = html || "Nenhum agendamento.";
        };

        window.excluirItem = async function(id) {
            if(confirm("Concluído? Isso vai apagar da lista.")) {
                await deleteDoc(doc(db, "agendamentos", id));
                document.getElementById(`item-${id}`).remove();
            }
        };
    </script>
</body>
</html>
